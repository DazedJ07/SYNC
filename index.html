<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC.org — Attendance Management</title>
    <meta name="description" content="SYNC - Smart Youth Networking & Collaboration. Premium attendance and student management system.">
    <script>
    (function () {
        try {
            var t = localStorage.getItem('syncorg-theme');
            if (t !== 'light' && t !== 'dark') t = 'light';
            document.documentElement.setAttribute('data-theme', t);
            if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/Logo/3.svg">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
